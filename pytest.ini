[pytest]
testpaths = tests/server tests/system
pythonpath = src
addopts = -v --tb=short
markers =
    slow: marks tests that start a real server process (deselect with -m "not slow")
    linux_only: run only on Linux
    windows_only: run only on Windows
    posix_only: run only on POSIX (Linux/macOS)
    requires_binary: skip if mag_client binary is not built
