# logging dictConfig loaded at startup
version = 1
disable_existing_loggers = false

[formatters.default]
format = "%(asctime)s  %(levelname)-8s  %(name)s  %(message)s"
datefmt = "%Y-%m-%d %H:%M:%S"

[handlers.console]
class = "logging.StreamHandler"
level = "INFO"
formatter = "default"
stream = "ext://sys.stdout"

[handlers.file]
class = "logging.handlers.RotatingFileHandler"
level = "DEBUG"
formatter = "default"
filename = "mag.log"
maxBytes = 10485760
backupCount = 3

[loggers.server]
level = "DEBUG"
handlers = ["console", "file"]
propagate = false

[root]
level = "WARNING"
handlers = ["console"]
